<svg xmlns="http://www.w3.org/2000/svg" width="200" height="26" viewBox="0 0 200 26">
  <!-- 正常状态 - 左边图标位置 + 右边背景 -->
  <g id="normal" transform="translate(0, 0)">
    <rect width="26" height="26" fill="#444444"/>
    <rect x="26" y="0" width="74" height="26" fill="#3a3a3a"/>
  </g>
  <!-- 选中状态 - 整个背景 -->
  <g id="selected" transform="translate(100, 0)">
    <linearGradient id="menu-skin-selected-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#556655"/>
      <stop offset="100%" stop-color="#445544"/>
    </linearGradient>
    <rect width="100" height="26" fill="url(#menu-skin-selected-gradient)"/>
  </g>
</svg>