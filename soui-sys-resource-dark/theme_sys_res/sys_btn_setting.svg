<svg xmlns="http://www.w3.org/2000/svg" width="120" height="30" viewBox="0 0 120 30">
  <!-- 正常状态 -->
  <g id="normal" transform="translate(0, 0)">
    <rect width="30" height="30" fill="transparent"/>
    <circle cx="15" cy="15" r="7" fill="none" stroke="#cccccc" stroke-width="2"/>
    <rect x="13" y="5" width="4" height="3" fill="#cccccc"/>
    <rect x="13" y="22" width="4" height="3" fill="#cccccc"/>
    <rect x="5" y="13" width="3" height="4" fill="#cccccc"/>
    <rect x="22" y="13" width="3" height="4" fill="#cccccc"/>
    <rect x="7" y="7" width="2" height="2" fill="#cccccc"/>
    <rect x="21" y="7" width="2" height="2" fill="#cccccc"/>
    <rect x="7" y="21" width="2" height="2" fill="#cccccc"/>
    <rect x="21" y="21" width="2" height="2" fill="#cccccc"/>
    <circle cx="15" cy="15" r="2" fill="#cccccc"/>
  </g>
  <!-- 悬停状态 -->
  <g id="hover" transform="translate(30, 0)">
    <rect width="30" height="30" fill="transparent"/>
    <circle cx="15" cy="15" r="7" fill="none" stroke="#ffffff" stroke-width="2"/>
    <rect x="13" y="5" width="4" height="3" fill="#ffffff"/>
    <rect x="13" y="22" width="4" height="3" fill="#ffffff"/>
    <rect x="5" y="13" width="3" height="4" fill="#ffffff"/>
    <rect x="22" y="13" width="3" height="4" fill="#ffffff"/>
    <rect x="7" y="7" width="2" height="2" fill="#ffffff"/>
    <rect x="21" y="7" width="2" height="2" fill="#ffffff"/>
    <rect x="7" y="21" width="2" height="2" fill="#ffffff"/>
    <rect x="21" y="21" width="2" height="2" fill="#ffffff"/>
    <circle cx="15" cy="15" r="2" fill="#ffffff"/>
  </g>
  <!-- 按下状态 -->
  <g id="pressed" transform="translate(60, 0)">
    <rect width="30" height="30" fill="transparent"/>
    <circle cx="15" cy="15" r="7" fill="none" stroke="#cccccc" stroke-width="2"/>
    <rect x="13" y="5" width="4" height="3" fill="#cccccc"/>
    <rect x="13" y="22" width="4" height="3" fill="#cccccc"/>
    <rect x="5" y="13" width="3" height="4" fill="#cccccc"/>
    <rect x="22" y="13" width="3" height="4" fill="#cccccc"/>
    <rect x="7" y="7" width="2" height="2" fill="#cccccc"/>
    <rect x="21" y="7" width="2" height="2" fill="#cccccc"/>
    <rect x="7" y="21" width="2" height="2" fill="#cccccc"/>
    <rect x="21" y="21" width="2" height="2" fill="#cccccc"/>
    <circle cx="15" cy="15" r="2" fill="#cccccc"/>
  </g>
  <!-- 禁用状态 -->
  <g id="disabled" transform="translate(90, 0)">
    <rect width="30" height="30" fill="transparent"/>
    <circle cx="15" cy="15" r="7" fill="none" stroke="#555555" stroke-width="2"/>
    <rect x="13" y="5" width="4" height="3" fill="#555555"/>
    <rect x="13" y="22" width="4" height="3" fill="#555555"/>
    <rect x="5" y="13" width="3" height="4" fill="#555555"/>
    <rect x="22" y="13" width="3" height="4" fill="#555555"/>
    <rect x="7" y="7" width="2" height="2" fill="#555555"/>
    <rect x="21" y="7" width="2" height="2" fill="#555555"/>
    <rect x="7" y="21" width="2" height="2" fill="#555555"/>
    <rect x="21" y="21" width="2" height="2" fill="#555555"/>
    <circle cx="15" cy="15" r="2" fill="#555555"/>
  </g>
</svg>