<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="40" viewBox="0 0 400 40" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 正常状态渐变 -->
    <linearGradient id="gradNormal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d2d2d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#252525;stop-opacity:1" />
    </linearGradient>
    
    <!-- 悬停状态渐变 -->
    <linearGradient id="gradHover" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3a3a3a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#333333;stop-opacity:1" />
    </linearGradient>
    
    <!-- 按下状态渐变 -->
    <linearGradient id="gradPressed" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#404040;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#383838;stop-opacity:1" />
    </linearGradient>
    
    <!-- 选中状态渐变 -->
    <linearGradient id="gradSelected" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e1e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 状态1: 正常 (Normal) - X: 0-100 -->
  <g id="normal">
    <!-- 背景 -->
    <rect x="0" y="0" width="100" height="40" fill="url(#gradNormal)"/>
    <!-- 右侧分隔线（细且淡） -->
    <line x1="99.5" y1="8" x2="99.5" y2="32" stroke="#3a3a3a" stroke-width="1"/>
    <!-- 底部描边 -->
    <line x1="0" y1="39.5" x2="100" y2="39.5" stroke="#3a3a3a" stroke-width="1"/>
  </g>
  
  <!-- 状态2: 悬停 (Hover) - X: 100-200 -->
  <g id="hover">
    <!-- 背景 -->
    <rect x="100" y="0" width="100" height="40" fill="url(#gradHover)"/>
    <!-- 右侧分隔线 -->
    <line x1="199.5" y1="8" x2="199.5" y2="32" stroke="#3a3a3a" stroke-width="1"/>
    <!-- 底部描边 -->
    <line x1="100" y1="39.5" x2="200" y2="39.5" stroke="#3a3a3a" stroke-width="1"/>
  </g>
  
  <!-- 状态3: 选中 (Selected) - X: 200-300 -->
  <g id="selected">
    <!-- 深色背景 -->
    <rect x="200" y="0" width="100" height="40" fill="url(#gradSelected)"/>
    <!-- 底部蓝色指示条 -->
    <rect x="200" y="37" width="100" height="3" fill="#5c9ce6"/>
  </g>
  
  <!-- 状态4: 禁用 (Disabled) - X: 300-400 -->
  <g id="disabled">
    <!-- 背景 -->
    <rect x="300" y="0" width="100" height="40" fill="url(#gradDisabled)" opacity="0.4"/>
    <!-- 右侧分隔线（淡） -->
    <line x1="399.5" y1="8" x2="399.5" y2="32" stroke="#333333" stroke-width="1" opacity="0.4"/>
    <!-- 底部描边 -->
    <line x1="300" y1="39.5" x2="400" y2="39.5" stroke="#3a3a3a" stroke-width="1" opacity="0.4"/>
  </g>
</svg>
