<svg xmlns="http://www.w3.org/2000/svg" width="80" height="20" viewBox="0 0 80 20">
  <!-- 正常状态 -->
  <g id="normal" transform="translate(0, 0)">
    <rect width="20" height="20" fill="#444444" stroke="#666666" stroke-width="1" rx="2" ry="2"/>
    <rect x="8" y="8" width="4" height="4" fill="#777777"/>
  </g>
  <!-- 悬停状态 -->
  <g id="hover" transform="translate(20, 0)">
    <rect width="20" height="20" fill="#555555" stroke="#777777" stroke-width="1" rx="2" ry="2"/>
    <rect x="8" y="8" width="4" height="4" fill="#888888"/>
  </g>
  <!-- 按下状态 -->
  <g id="pressed" transform="translate(40, 0)">
    <rect width="20" height="20" fill="#333333" stroke="#555555" stroke-width="1" rx="2" ry="2"/>
    <rect x="8" y="8" width="4" height="4" fill="#666666"/>
  </g>
  <!-- 禁用状态 -->
  <g id="disabled" transform="translate(60, 0)">
    <rect width="20" height="20" fill="#333333" stroke="#555555" stroke-width="1" rx="2" ry="2"/>
    <rect x="8" y="8" width="4" height="4" fill="#555555"/>
  </g>
</svg>