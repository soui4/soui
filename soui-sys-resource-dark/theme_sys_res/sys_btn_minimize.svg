<svg xmlns="http://www.w3.org/2000/svg" width="91" height="31" viewBox="0 0 91 31">
  <!-- 正常状态 -->
  <g id="normal">
    <line x1="9" y1="15" x2="21" y2="15" stroke="#cccccc" stroke-width="2" stroke-linecap="round"/>
  </g>
  <!-- 悬停状态 -->
  <g id="hover" transform="translate(30, 0)">
    <line x1="9" y1="15" x2="21" y2="15" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  </g>
  <!-- 按下状态 -->
  <g id="pressed" transform="translate(61, 0)">
    <line x1="9" y1="15" x2="21" y2="15" stroke="#cccccc" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>