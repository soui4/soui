<svg xmlns="http://www.w3.org/2000/svg" width="200" height="30" viewBox="0 0 200 30">
  <!-- 正常状态 -->
  <g id="normal" transform="translate(0, 0)">
    <linearGradient id="btn-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#555555"/>
      <stop offset="100%" stop-color="#444444"/>
    </linearGradient>
    <rect width="50" height="30" rx="4" ry="4" fill="url(#btn-gradient)" stroke="#666666" stroke-width="1"/>
  </g>
  <!-- 悬停状态 -->
  <g id="hover" transform="translate(50, 0)">
    <linearGradient id="btn-hover-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#666666"/>
      <stop offset="100%" stop-color="#555555"/>
    </linearGradient>
    <rect width="50" height="30" rx="4" ry="4" fill="url(#btn-hover-gradient)" stroke="#777777" stroke-width="1"/>
  </g>
  <!-- 按下状态 -->
  <g id="pressed" transform="translate(100, 0)">
    <linearGradient id="btn-pressed-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#444444"/>
      <stop offset="100%" stop-color="#333333"/>
    </linearGradient>
    <rect width="50" height="30" rx="4" ry="4" fill="url(#btn-pressed-gradient)" stroke="#555555" stroke-width="1"/>
  </g>
  <!-- 禁用状态 -->
  <g id="disabled" transform="translate(150, 0)">
    <linearGradient id="btn-disabled-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#444444"/>
      <stop offset="100%" stop-color="#333333"/>
    </linearGradient>
    <rect width="50" height="30" rx="4" ry="4" fill="url(#btn-disabled-gradient)" stroke="#555555" stroke-width="1"/>
  </g>
</svg>