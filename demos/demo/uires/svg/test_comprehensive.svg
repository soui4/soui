<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="600" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
    <!-- Background -->
    <rect x="0" y="0" width="600" height="600" fill="#fafafa" />

    <!-- Title -->
    <text x="300" y="30" font-size="24" font-family="Arial" fill="#2c3e50" text-anchor="middle" font-weight="bold">SOUI Skia SVG Test</text>

    <!-- Section 1: Basic Shapes -->
    <g transform="translate(20, 50)">
        <text x="0" y="0" font-size="14" font-weight="bold" fill="#333">Basic Shapes</text>
        
        <!-- Rectangle -->
        <rect x="0" y="20" width="80" height="50" fill="#e74c3c" stroke="#c0392b" stroke-width="2" />
        <text x="40" y="85" font-size="10" fill="#333" text-anchor="middle">rect</text>

        <!-- Circle -->
        <circle cx="160" cy="45" r="30" fill="#3498db" stroke="#2980b9" stroke-width="2" />
        <text x="160" y="85" font-size="10" fill="#333" text-anchor="middle">circle</text>

        <!-- Ellipse -->
        <ellipse cx="280" cy="45" rx="40" ry="25" fill="#2ecc71" stroke="#27ae60" stroke-width="2" />
        <text x="280" y="85" font-size="10" fill="#333" text-anchor="middle">ellipse</text>

        <!-- Line -->
        <line x1="360" y1="20" x2="440" y2="70" stroke="#9b59b6" stroke-width="3" stroke-linecap="round" />
        <text x="400" y="85" font-size="10" fill="#333" text-anchor="middle">line</text>

        <!-- Polyline -->
        <polyline points="480,20 500,50 520,20 540,50 560,20" fill="none" stroke="#f39c12" stroke-width="3" stroke-linejoin="round" />
        <text x="520" y="85" font-size="10" fill="#333" text-anchor="middle">polyline</text>
    </g>

    <!-- Section 2: Polygon and Path -->
    <g transform="translate(20, 150)">
        <text x="0" y="0" font-size="14" font-weight="bold" fill="#333">Polygon &amp; Path</text>
        
        <!-- Polygon -->
        <polygon points="0,20 30,70 60,20 90,70 120,20" fill="#1abc9c" stroke="#16a085" stroke-width="2" />
        <text x="60" y="85" font-size="10" fill="#333" text-anchor="middle">polygon</text>

        <!-- Path - Line -->
        <path d="M 150 20 L 200 20 L 200 70 L 150 70 Z" fill="#e67e22" />
        <text x="175" y="85" font-size="10" fill="#333" text-anchor="middle">path (rect)</text>

        <!-- Path - Curve -->
        <path d="M 230 20 Q 280 20 280 45 T 330 45" fill="none" stroke="#34495e" stroke-width="3" />
        <text x="280" y="85" font-size="10" fill="#333" text-anchor="middle">path (curve)</text>

        <!-- Path - Arc -->
        <path d="M 360 20 A 30 30 0 1 1 360 80" fill="none" stroke="#d35400" stroke-width="3" />
        <text x="360" y="85" font-size="10" fill="#333" text-anchor="middle">path (arc)</text>

        <!-- Complex Path -->
        <path d="M 420 20 C 420 20 440 20 440 45 S 460 70 480 70" fill="none" stroke="#8e44ad" stroke-width="3" />
        <text x="450" y="85" font-size="10" fill="#333" text-anchor="middle">path (bezier)</text>
    </g>

    <!-- Section 3: Fill and Stroke -->
    <g transform="translate(20, 250)">
        <text x="0" y="0" font-size="14" font-weight="bold" fill="#333">Fill &amp; Stroke</text>
        
        <!-- Fill only -->
        <rect x="0" y="20" width="60" height="40" fill="#e74c3c" />
        <text x="30" y="75" font-size="10" fill="#333" text-anchor="middle">fill only</text>

        <!-- Stroke only -->
        <rect x="80" y="20" width="60" height="40" fill="none" stroke="#3498db" stroke-width="3" />
        <text x="110" y="75" font-size="10" fill="#333" text-anchor="middle">stroke only</text>

        <!-- Both fill and stroke -->
        <rect x="160" y="20" width="60" height="40" fill="#2ecc71" stroke="#27ae60" stroke-width="3" />
        <text x="190" y="75" font-size="10" fill="#333" text-anchor="middle">both</text>

        <!-- No fill, no stroke -->
        <rect x="240" y="20" width="60" height="40" fill="none" stroke="none" />
        <text x="270" y="75" font-size="10" fill="#333" text-anchor="middle">none</text>

        <!-- Stroke width variations -->
        <line x1="320" y1="20" x2="400" y2="20" stroke="#9b59b6" stroke-width="1" />
        <line x1="320" y1="35" x2="400" y2="35" stroke="#9b59b6" stroke-width="3" />
        <line x1="320" y1="50" x2="400" y2="50" stroke="#9b59b6" stroke-width="5" />
        <text x="360" y="75" font-size="10" fill="#333" text-anchor="middle">stroke width</text>

        <!-- Line cap variations -->
        <line x1="420" y1="20" x2="480" y2="20" stroke="#f39c12" stroke-width="5" stroke-linecap="butt" />
        <line x1="420" y1="35" x2="480" y2="35" stroke="#f39c12" stroke-width="5" stroke-linecap="round" />
        <line x1="420" y1="50" x2="480" y2="50" stroke="#f39c12" stroke-width="5" stroke-linecap="square" />
        <text x="450" y="75" font-size="10" fill="#333" text-anchor="middle">line cap</text>
    </g>

    <!-- Section 4: Opacity -->
    <g transform="translate(20, 350)">
        <text x="0" y="0" font-size="14" font-weight="bold" fill="#333">Opacity</text>
        
        <rect x="0" y="20" width="50" height="40" fill="#e74c3c" opacity="1.0" />
        <text x="25" y="75" font-size="10" fill="#333" text-anchor="middle">1.0</text>

        <rect x="60" y="20" width="50" height="40" fill="#e74c3c" opacity="0.75" />
        <text x="85" y="75" font-size="10" fill="#333" text-anchor="middle">0.75</text>

        <rect x="120" y="20" width="50" height="40" fill="#e74c3c" opacity="0.5" />
        <text x="145" y="75" font-size="10" fill="#333" text-anchor="middle">0.5</text>

        <rect x="180" y="20" width="50" height="40" fill="#e74c3c" opacity="0.25" />
        <text x="205" y="75" font-size="10" fill="#333" text-anchor="middle">0.25</text>

        <!-- RGBA opacity -->
        <rect x="240" y="20" width="50" height="40" fill="rgba(231, 76, 60, 0.5)" />
        <text x="265" y="75" font-size="10" fill="#333" text-anchor="middle">rgba</text>
    </g>

    <!-- Section 5: Color Formats -->
    <g transform="translate(20, 430)">
        <text x="0" y="0" font-size="14" font-weight="bold" fill="#333">Color Formats</text>
        
        <circle cx="25" cy="40" r="20" fill="#e74c3c" />
        <text x="25" y="75" font-size="9" fill="#333" text-anchor="middle">#RRGGBB</text>

        <circle cx="85" cy="40" r="20" fill="#3498db" />
        <text x="85" y="75" font-size="9" fill="#333" text-anchor="middle">#RGB</text>

        <circle cx="145" cy="40" r="20" fill="rgb(46, 204, 113)" />
        <text x="145" y="75" font-size="9" fill="#333" text-anchor="middle">rgb()</text>

        <circle cx="205" cy="40" r="20" fill="rgba(52, 152, 219, 0.8)" />
        <text x="205" y="75" font-size="9" fill="#333" text-anchor="middle">rgba()</text>

        <circle cx="265" cy="40" r="20" fill="orange" />
        <text x="265" y="75" font-size="9" fill="#333" text-anchor="middle">name</text>

        <circle cx="325" cy="40" r="20" fill="purple" />
        <text x="325" y="75" font-size="9" fill="#333" text-anchor="middle">name</text>
    </g>

    <!-- Section 6: Transformations -->
    <g transform="translate(20, 510)">
        <text x="0" y="0" font-size="14" font-weight="bold" fill="#333">Transformations</text>
        
        <!-- Original -->
        <rect x="0" y="20" width="40" height="40" fill="#e74c3c" />
        <text x="20" y="75" font-size="9" fill="#333" text-anchor="middle">original</text>

        <!-- Translate -->
        <rect x="60" y="20" width="40" height="40" fill="#3498db" transform="translate(10, 10)" />
        <text x="90" y="75" font-size="9" fill="#333" text-anchor="middle">translate</text>

        <!-- Rotate -->
        <rect x="120" y="20" width="40" height="40" fill="#2ecc71" transform="rotate(45, 140, 40)" />
        <text x="140" y="75" font-size="9" fill="#333" text-anchor="middle">rotate</text>

        <!-- Scale -->
        <rect x="180" y="20" width="40" height="40" fill="#f39c12" transform="scale(1.5)" />
        <text x="210" y="75" font-size="9" fill="#333" text-anchor="middle">scale</text>

        <!-- Skew -->
        <rect x="240" y="20" width="40" height="40" fill="#9b59b6" transform="skewX(20)" />
        <text x="260" y="75" font-size="9" fill="#333" text-anchor="middle">skewX</text>
    </g>

    <!-- Section 7: Text -->
    <g transform="translate(350, 430)">
        <text x="0" y="0" font-size="14" font-weight="bold" fill="#333">Text</text>
        
        <text x="0" y="30" font-size="12" fill="#e74c3c">Red text</text>
        <text x="0" y="50" font-size="14" fill="#3498db">Blue text</text>
        <text x="0" y="70" font-size="16" fill="#2ecc71" font-weight="bold">Green bold</text>
        <text x="0" y="90" font-size="18" fill="#f39c12" font-style="italic">Orange italic</text>
    </g>
</svg>
