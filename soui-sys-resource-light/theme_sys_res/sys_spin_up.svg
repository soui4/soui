<svg xmlns="http://www.w3.org/2000/svg" width="17" height="48" viewBox="0 0 17 48">
  <!-- 正常状态 -->
  <g id="normal" transform="translate(0, 0)">
    <rect width="16" height="16" fill="#f0f0f0" stroke="#cccccc" stroke-width="1"/>
    <path d="M8,6 L12,10 L4,10 Z" stroke="#666666" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
  <!-- 悬停状态 -->
  <g id="hover" transform="translate(0, 16)">
    <rect width="16" height="16" fill="#e0e0e0" stroke="#bbbbbb" stroke-width="1"/>
    <path d="M8,6 L12,10 L4,10 Z" stroke="#333333" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
  <!-- 按下状态 -->
  <g id="pressed" transform="translate(0, 32)">
    <rect width="16" height="16" fill="#d0d0d0" stroke="#aaaaaa" stroke-width="1"/>
    <path d="M8,6 L12,10 L4,10 Z" stroke="#666666" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
</svg>