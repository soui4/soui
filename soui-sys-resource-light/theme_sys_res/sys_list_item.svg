    <rect width="60" height="40" fill="#f0f0f0"/>
  </g>
  <g id="hover" transform="translate(60, 0)">
    <rect width="60" height="40" fill="#e8e8e8"/>
  </g>
  <g id="pressed" transform="translate(120, 0)">
