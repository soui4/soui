<svg xmlns="http://www.w3.org/2000/svg" width="120" height="30" viewBox="0 0 120 30">
  <g id="normal" transform="translate(0, 0)">
    <rect width="30" height="30" fill="#f0f0f0" stroke="#e0e0e0" stroke-width="1" rx="3" ry="3"/>
    <rect x="8" y="8" width="14" height="14" fill="none" stroke="#333333" stroke-width="2"/>
    <rect x="11" y="11" width="5" height="5" fill="#333333"/>
  </g>
  <g id="hover" transform="translate(30, 0)">
    <rect width="30" height="30" fill="#e8e8e8" stroke="#d0d0d0" stroke-width="1" rx="3" ry="3"/>
    <rect x="8" y="8" width="14" height="14" fill="none" stroke="#000000" stroke-width="2"/>
    <rect x="11" y="11" width="5" height="5" fill="#000000"/>
  </g>
  <g id="pressed" transform="translate(60, 0)">
    <rect width="30" height="30" fill="#d8d8d8" stroke="#c0c0c0" stroke-width="1" rx="3" ry="3"/>
    <rect x="8" y="8" width="14" height="14" fill="none" stroke="#555555" stroke-width="2"/>
    <rect x="11" y="11" width="5" height="5" fill="#555555"/>
  </g>
  <g id="disabled" transform="translate(90, 0)">
    <rect width="30" height="30" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="1" rx="3" ry="3"/>
    <rect x="8" y="8" width="14" height="14" fill="none" stroke="#999999" stroke-width="2"/>
    <rect x="11" y="11" width="5" height="5" fill="#999999"/>
  </g>
</svg>