<svg xmlns="http://www.w3.org/2000/svg" width="64" height="16" viewBox="0 0 64 16">
  <!-- 正常状态 -->
  <g id="normal" transform="translate(0, 0)">
    <rect width="16" height="16" fill="#f0f0f0" stroke="#e0e0e0" stroke-width="1"/>
    <path d="M4,4 L12,12 M4,12 L12,4" stroke="#333333" stroke-width="2" stroke-linecap="round"/>
  </g>
  <!-- 悬停状态 -->
  <g id="hover" transform="translate(16, 0)">
    <rect width="16" height="16" fill="#e8e8e8" stroke="#d0d0d0" stroke-width="1"/>
    <path d="M4,4 L12,12 M4,12 L12,4" stroke="#000000" stroke-width="2" stroke-linecap="round"/>
  </g>
  <!-- 按下状态 -->
  <g id="pressed" transform="translate(32, 0)">
    <rect width="16" height="16" fill="#d8d8d8" stroke="#c0c0c0" stroke-width="1"/>
    <path d="M4,4 L12,12 M4,12 L12,4" stroke="#555555" stroke-width="2" stroke-linecap="round"/>
  </g>
  <!-- 禁用状态 -->
  <g id="disabled" transform="translate(48, 0)">
    <rect width="16" height="16" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="1"/>
    <path d="M4,4 L12,12 M4,12 L12,4" stroke="#999999" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>