<svg xmlns="http://www.w3.org/2000/svg" width="200" height="30" viewBox="0 0 200 30">
  <!-- 正常状态 -->
  <g id="normal" transform="translate(0, 0)">
    <linearGradient id="btn-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e0e0e0"/>
      <stop offset="100%" stop-color="#d0d0d0"/>
    </linearGradient>
    <rect width="50" height="30" rx="4" ry="4" fill="url(#btn-gradient)" stroke="#cccccc" stroke-width="1"/>
  </g>
  <!-- 悬停状态 -->
  <g id="hover" transform="translate(50, 0)">
    <linearGradient id="btn-hover-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0f0f0"/>
      <stop offset="100%" stop-color="#e0e0e0"/>
    </linearGradient>
    <rect width="50" height="30" rx="4" ry="4" fill="url(#btn-hover-gradient)" stroke="#bbbbbb" stroke-width="1"/>
  </g>
  <!-- 按下状态 -->
  <g id="pressed" transform="translate(100, 0)">
    <linearGradient id="btn-pressed-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d0d0d0"/>
      <stop offset="100%" stop-color="#c0c0c0"/>
    </linearGradient>
    <rect width="50" height="30" rx="4" ry="4" fill="url(#btn-pressed-gradient)" stroke="#aaaaaa" stroke-width="1"/>
  </g>
  <!-- 禁用状态 -->
  <g id="disabled" transform="translate(150, 0)">
    <linearGradient id="btn-disabled-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8e8e8"/>
      <stop offset="100%" stop-color="#d8d8d8"/>
    </linearGradient>
    <rect width="50" height="30" rx="4" ry="4" fill="url(#btn-disabled-gradient)" stroke="#cccccc" stroke-width="1"/>
  </g>
</svg>