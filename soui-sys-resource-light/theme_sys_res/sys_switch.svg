<svg xmlns="http://www.w3.org/2000/svg" width="152" height="19" viewBox="0 0 152 19">
  <!-- OFF States (First 4 states) -->
  
  <!-- 正常关闭 - Normal OFF -->
  <g id="off_normal" transform="translate(0, 0)">
    <circle cx="9.5" cy="9.5" r="7.5" fill="#666666"/>
    <circle cx="9.5" cy="9.5" r="6.5" fill="#888888"/>
  </g>
  
  <!-- 悬停关闭 - Hover OFF -->
  <g id="off_hover" transform="translate(19, 0)">
    <circle cx="9.5" cy="9.5" r="7.5" fill="#555555"/>
    <circle cx="9.5" cy="9.5" r="6.5" fill="#777777"/>
  </g>
  
  <!-- 按下关闭 - Pressed OFF -->
  <g id="off_pressed" transform="translate(38, 0)">
    <circle cx="9.5" cy="9.5" r="7.5" fill="#777777"/>
    <circle cx="9.5" cy="9.5" r="6.5" fill="#999999"/>
  </g>
  
  <!-- 禁用关闭 - Disabled OFF -->
  <g id="off_disabled" transform="translate(57, 0)">
    <circle cx="9.5" cy="9.5" r="7.5" fill="#aaaaaa" opacity="0.5"/>
    <circle cx="9.5" cy="9.5" r="6.5" fill="#cccccc" opacity="0.5"/>
  </g>

  <!-- ON States (Last 4 states) -->
  
  <!-- 正常开启 - Normal ON -->
  <g id="on_normal" transform="translate(76, 0)">
    <circle cx="9.5" cy="9.5" r="7.5" fill="#4caf50"/>
    <circle cx="9.5" cy="9.5" r="6.5" fill="#66bb6a"/>
    <!-- Checkmark indicator -->
    <path d="M 6.5 9.5 L 8.5 11.5 L 12.5 7.5" stroke="#ffffff" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- 悬停开启 - Hover ON -->
  <g id="on_hover" transform="translate(95, 0)">
    <circle cx="9.5" cy="9.5" r="7.5" fill="#66bb6a"/>
    <circle cx="9.5" cy="9.5" r="6.5" fill="#81c784"/>
    <!-- Checkmark indicator -->
    <path d="M 6.5 9.5 L 8.5 11.5 L 12.5 7.5" stroke="#ffffff" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- 按下开启 - Pressed ON -->
  <g id="on_pressed" transform="translate(114, 0)">
    <circle cx="9.5" cy="9.5" r="7.5" fill="#43a047"/>
    <circle cx="9.5" cy="9.5" r="6.5" fill="#5cb85c"/>
    <!-- Checkmark indicator -->
    <path d="M 6.5 9.5 L 8.5 11.5 L 12.5 7.5" stroke="#ffffff" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- 禁用开启 - Disabled ON -->
  <g id="on_disabled" transform="translate(133, 0)">
    <circle cx="9.5" cy="9.5" r="7.5" fill="#4caf50" opacity="0.5"/>
    <circle cx="9.5" cy="9.5" r="6.5" fill="#66bb6a" opacity="0.5"/>
    <!-- Checkmark indicator -->
    <path d="M 6.5 9.5 L 8.5 11.5 L 12.5 7.5" stroke="#ffffff" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
  </g>
</svg>