<svg xmlns="http://www.w3.org/2000/svg" width="480" height="19" viewBox="0 0 480 19">
  <!-- 正常开启 -->
  <g id="on_normal" transform="translate(0, 0)">
    <rect width="60" height="19" fill="#66aa66" rx="9" ry="9"/>
    <circle cx="50" cy="9.5" r="8" fill="#aaddaa"/>
  </g>
  <!-- 悬停开启 -->
  <g id="on_hover" transform="translate(60, 0)">
    <rect width="60" height="19" fill="#77bb77" rx="9" ry="9"/>
    <circle cx="50" cy="9.5" r="8" fill="#bbeebb"/>
  </g>
  <!-- 按下开启 -->
  <g id="on_pressed" transform="translate(120, 0)">
    <rect width="60" height="19" fill="#559955" rx="9" ry="9"/>
    <circle cx="50" cy="9.5" r="8" fill="#99cc99"/>
  </g>
  <!-- 禁用开启 -->
  <g id="on_disabled" transform="translate(180, 0)">
    <rect width="60" height="19" fill="#448844" rx="9" ry="9"/>
    <circle cx="50" cy="9.5" r="8" fill="#88aa88"/>
  </g>

  <!-- 正常关闭 -->
  <g id="off_normal" transform="translate(240, 0)">
    <rect width="60" height="19" fill="#cccccc" rx="9" ry="9"/>
    <circle cx="10" cy="9.5" r="8" fill="#ffffff"/>
  </g>
  <!-- 悬停关闭 -->
  <g id="off_hover" transform="translate(300, 0)">
    <rect width="60" height="19" fill="#dddddd" rx="9" ry="9"/>
    <circle cx="10" cy="9.5" r="8" fill="#ffffff"/>
  </g>
  <!-- 按下关闭 -->
  <g id="off_pressed" transform="translate(360, 0)">
    <rect width="60" height="19" fill="#bbbbbb" rx="9" ry="9"/>
    <circle cx="10" cy="9.5" r="8" fill="#eeeeee"/>
  </g>
  <!-- 禁用关闭 -->
  <g id="off_disabled" transform="translate(420, 0)">
    <rect width="60" height="19" fill="#e0e0e0" rx="9" ry="9"/>
    <circle cx="10" cy="9.5" r="8" fill="#f0f0f0"/>
  </g>
</svg>